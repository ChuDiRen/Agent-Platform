[pytest]
# pytest 配置
# 基于 playwright-best-practices 最佳实践

# 测试发现
testpaths = tests
norecursedirs = tests/api/legacy
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 自定义 markers（标签）
markers =
    smoke: 冒烟测试（快速验证核心功能）
    users: 用户相关测试
    auth: 认证相关测试
    crud: CRUD 操作测试
    integration: 集成测试
    slow: 慢速测试（可能需要较长时间）
    real_service: 真实运行服务集成测试（需显式设置 RUN_REAL_SERVICE_TESTS=1）

# 严格模式：未注册的 marker 会报错
strict_markers = true

# 显示详细输出
addopts = -v --tb=short

# 禁用 pytest-xdist 的自动并行（如果安装了的话）
# addopts = -v --tb=short -p no:xdist
